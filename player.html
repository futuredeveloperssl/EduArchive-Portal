<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduArchive — Watch Lessons</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/collection.css"/>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div>

<nav class="nav">
  <div class="nav-brand"><div class="nav-brand-icon">🎓</div><span>EduArchive</span></div>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">📚 Library</a>
  </div>
  <div class="nav-actions">
    <div class="nav-avatar" id="navAvatar"></div>
    <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sign Out</button>
  </div>
</nav>

<div class="player-page page-container">

  <!-- Left: Lesson list -->
  <aside class="lesson-sidebar" id="lessonSidebar">
    <div class="lesson-sidebar-header">
      <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
      <h3 id="monthTitle">Loading…</h3>
      <div class="lesson-progress-wrap" id="progressWrap"></div>
    </div>
    <div class="lesson-list" id="lessonList"></div>
  </aside>

  <!-- Right: Player -->
  <main class="player-main" id="playerMain">
    <div class="player-container" id="playerContainer">

      <div class="video-meta" id="videoMeta">
        <div class="video-title" id="videoTitle">Select a lesson to begin</div>
        <div class="video-sub" id="videoSub"></div>
      </div>

      <div class="video-wrapper" id="videoWrapper">
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="placeholder-icon">▶</div>
          <p>Choose a lesson from the sidebar</p>
        </div>
        <div class="video-secure-wrapper" id="secureWrapper" style="display:none">
          <div id="ytPlayer"></div>
        </div>
      </div>

      <div class="video-controls" id="videoControls" style="display:none">
        <button class="btn btn-ghost btn-sm" id="prevBtn">← Prev</button>
        <div class="video-info-pill" id="lessonCounter"></div>
        <button class="btn btn-primary btn-sm" id="nextBtn">Next →</button>
      </div>

      <div class="lesson-description" id="lessonDescription" style="display:none">
        <h4>📖 About this lesson</h4>
        <p id="lessonDescText">This lesson covers essential concepts with hands-on examples.</p>
      </div>

    </div>
  </main>

</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/player.js"></script>
</body>
</html>
